services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DB_DSN: "root:password@tcp(mysql:3306)/openresume?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      JWT_SECRET: "change-me"
      CORS_ORIGINS: "http://localhost"
      UPLOAD_BACKEND: "local"
      FRONTEND_BASE_URL: "http://frontend"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api/v1"
    depends_on:
      - backend
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openresume
      MYSQL_USER: openresume
      MYSQL_PASSWORD: openresume
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  uploads:
  mysql_data:
  redis_data:

