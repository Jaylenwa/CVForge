services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "cvforge:!@!$&#!^@tcp(mysql:3306)/cvforge?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "!@!$&#!^"
      JWT_SECRET: "abcdefghijklmnopqrstuvwxyz"
      CORS_ORIGINS: "http://vfoy.cn,https://vfoy.cn,http://www.vfoy.cn,https://www.vfoy.cn,http://frontend"
      FRONTEND_BASE_URL: "http://frontend"
      CHROME_API_URL: "http://chrome:3000"
    volumes:
      - /var/lib/cvforge/upload:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      chrome:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OAUTH_ALLOWED_ORIGINS: "http://vfoy.cn,https://vfoy.cn,http://www.vfoy.cn,https://www.vfoy.cn,http://frontend"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "!@!$&#!^"
      MYSQL_DATABASE: cvforge
      MYSQL_USER: cvforge
      MYSQL_PASSWORD: "!@!$&#!^"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/cvforge/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "33066:3306"

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: "!@!$&#!^"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "!@!$&#!^"]
    volumes:
      - /var/lib/cvforge/redis:/data
    ports:
      - "63799:6379"

  chrome:
    build:
      context: .
      dockerfile: Dockerfile_Chrome
    restart: unless-stopped
    ports:
      - "3000:3000"
