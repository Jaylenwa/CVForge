services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "root:password@tcp(mysql:3306)/openresume?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      JWT_SECRET: "change-me"
      CORS_ORIGINS: "http://vfoy.cn,https://vfoy.cn,http://www.vfoy.cn,https://www.vfoy.cn"
      UPLOAD_BACKEND: "local"
      FRONTEND_BASE_URL: "http://www.vfoy.cn"
      OAUTH_ALLOWED_ORIGINS: "http://vfoy.cn,https://vfoy.cn,http://www.vfoy.cn,https://www.vfoy.cn"
      WECHAT_APP_ID: "${WECHAT_APP_ID:-}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET:-}"
      WECHAT_REDIRECT_URI: "http://vfoy.cn/api/v1/auth/wechat/callback"
      FEATURE_WECHAT_LOGIN: "off"
      GITHUB_CLIENT_ID: "Ov23liwTPGaHmFuVwdKF"
      GITHUB_CLIENT_SECRET: "99d0256ebd2609f4b04c2808524d4449d0cdd1a0"
      GITHUB_REDIRECT_URI: "http://vfoy.cn/api/v1/auth/github/callback"
      CHROME_JSON_URL: "http://chrome:3000/json/version"
      SMTP_HOST: "smtp.qq.com"
      SMTP_PORT: "465"
      SMTP_USERNAME: "1318248167@qq.com"
      SMTP_PASSWORD: "pfyqdiadwwvfbadj"
      SMTP_FROM_NAME: "OpenResume"
    volumes:
      - /var/lib/openresume/upload:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      chrome:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api/v1"
        VITE_OAUTH_ALLOWED_ORIGINS: "http://vfoy.cn,https://vfoy.cn,http://www.vfoy.cn,https://www.vfoy.cn"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openresume
      MYSQL_USER: openresume
      MYSQL_PASSWORD: openresume
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/openresume/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    volumes:
      - /var/lib/openresume/redis:/data
    ports:
      - "6379:6379"

  chrome:
    build:
      context: .
      dockerfile: Dockerfile_Chrome
    restart: unless-stopped
    ports:
      - "3000:3000"
