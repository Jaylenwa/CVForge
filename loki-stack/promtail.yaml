server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: openresume
    static_configs:
      - targets:
          - localhost
        labels:
          job: openresume
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      # 解析 Docker JSON
      - docker: {}
      # 只保留 openresume-* 容器（不关心 -1 / -2）
      - drop:
          source: container_name
          expression: '^(?!/?openresume-).*'
      # 仅 backend 容器做 JSON 结构化解析
      - match:
          selector: '{container_name=~"/?openresume-backend.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
