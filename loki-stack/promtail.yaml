server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: openresume
    static_configs:
      - targets:
          - localhost
        labels:
          job: openresume
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      # 1️⃣ 解析 Docker JSON 日志
      - docker: {}

      # 2️⃣ 只保留 openresume-*，其它全部丢弃（RE2 合法写法）
      - match:
          selector: '{container_name!~"/?openresume-.*"}'
          stages:
            - drop: {}

      # 3️⃣ 仅 backend 做 JSON 结构化
      - match:
          selector: '{container_name=~"/?openresume-backend.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
