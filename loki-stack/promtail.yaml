server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: openresume-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: openresume
          __path__: /var/lib/docker/containers/*/*.log   # 抓所有容器日志文件
    pipeline_stages:
      - docker: {}   # 解析 Docker JSON 日志，自动生成 container_name, container_id, image 等标签
      - match:
          selector: '{container_name=~"openresume-frontend-1|openresume-backend-1|openresume-chrome-1"}'
      - json:
          expressions:
            level: level     # 如果日志 JSON 有 level 字段
            msg: msg         # 如果日志 JSON 有 msg 字段
