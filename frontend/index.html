<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVForge - Build Your Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Noto Sans SC', 'sans-serif'],
            },
            colors: {
              primary: '#2563eb',
              secondary: '#475569',
            }
          }
        }
      }
    </script>
    <style>
      @media print {
        @page { size: A4; margin: 0; }
        body { 
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .resume-rich-content ul { list-style: disc; padding-left: 1.25rem; margin: 0.25rem 0; }
      .resume-rich-content ol { list-style: decimal; padding-left: 1.25rem; margin: 0.25rem 0; }
      .resume-rich-content li { margin: 0.125rem 0; }
      .resume-rich-content p { margin: 0.25rem 0; }
      .resume-rich-content a { color: #2563eb; text-decoration: underline; }
    </style>
    
</head>
  <body class="bg-gray-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
